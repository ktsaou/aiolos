# nut.conf — which UPS(es) the `nut` anemos monitors.
#
# One UPS id per line; blank lines and `#` comments are ignored. An id is a NUT name as known to the
# local upsd (e.g. `pr3000-nova`) or `name@host[:port]` for a remote upsd.
#
# This file is the place for your environment-specific UPS host — keep real hosts HERE (operator
# config), not in the repo. `upsc` reads only public UPS variables (no login), so no credentials are
# needed for monitoring; for an authenticated/remote upsd configure NUT (upsmon/upsd) out-of-band.
#
# If this file is absent or lists nothing, the module auto-discovers the local upsd's UPSes via
# `upsc -l`. List ids explicitly to monitor a specific or remote UPS.
#
# Example (uncomment and edit):
# pr3000-nova
# ups2@10.0.0.5:3493
