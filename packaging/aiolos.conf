# aiolos registry + globals.
#
# Globals are `key=value` lines (shown commented with their defaults). Module lines are
# `<binary_name> [input=<peer_module>]`. Blank lines and `#` comments are ignored.

# --- globals (defaults shown) ---
# tick=3                       # heartbeat period, seconds
# timeout=2                    # max wait for an apply reply, seconds (must be < tick)
# detect_every=10              # hotplug re-detect period, seconds
# status_bind=0.0.0.0:9876     # read-only status page (HTML at /, JSON at /status.json)
#                              # set 127.0.0.1:9876 to restrict to localhost

# --- modules ---
nvidia
asrock16-2t  input=nvidia      # board fans follow max(GPU temps from nvidia, own CPU sensors)
