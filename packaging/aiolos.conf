# aiolos registry + globals.
#
# Globals are `key=value` lines (shown commented with their defaults). Module lines are
# `<binary_name> [input=<peer_module>] [every=<dur>] [timeout=<dur>]`. Blank lines and `#`
# comments are ignored.
#
# Scheduler model (SOW-0013): aiolos wakes every `base_tick` and does only non-blocking work — it
# dispatches a fresh `apply` to each anemos that is idle and due (now - last_dispatch >= its
# `every`), and reaps whatever results the per-anemos worker threads posted asynchronously. At most
# ONE apply is in flight per anemos: a slow/hung one is DELAYED (re-dispatched when it frees), never
# queued and never replayed — its effective period is ~max(every, apply_duration). Only a per-anemos
# `timeout` breach kills + restores it. So `timeout` MAY exceed `every`/`base_tick`.

# --- globals (defaults shown) ---
# base_tick=100                # scheduler wake period; bare number = MILLISECONDS (100ms/1s also ok).
#                              # The loop only wakes this often, so it is the floor for every `every`.
# detect_every=10              # hotplug re-detect period, seconds
# max_backoff=300              # cap (seconds) on the exponential respawn backoff; aiolos retries a
#                              # crashed/declared-fatal module forever, never slower than this
# status_bind=0.0.0.0:9876     # read-only status page (HTML at /, JSON at /status.json)
#                              # set 127.0.0.1:9876 to restrict to localhost
#
# --- per-module schedule directives (on a module line; defaults shown) ---
# every=1                      # how often this anemos's apply runs; bare number = SECONDS (500ms ok).
#                              # Raised to base_tick if smaller (can't be finer than a wake).
# timeout=5                    # max wait for one apply reply; bare number = SECONDS (ms also ok).
#                              # On breach: SIGKILL + device restore. May exceed every/base_tick.
#   e.g.  nvidia every=500ms timeout=3

# --- modules ---
nvidia
nvme                                    # NVMe SSD temperatures (sensor-only; controls nothing)
ipmi-temps                              # BMC board/CPU/DIMM/NIC temperatures (sensor-only; controls nothing)
asrock16-2t  input=nvidia input=nvme input=ipmi-temps   # board fans follow max(GPU, NVMe, BMC temps, own CPU sensors)
nut                                     # UPS / utility-power state (sensor-only; which UPS in etc/nut.conf)
nvidia-powercap  input=nut                 # caps GPU power on a utility-power event (curve-less control; policy in etc/nvidia-powercap.conf)
