# nvidia-powercap.conf — GPU power-cap policy for the `nvidia-powercap` anemos.
#
# `key=value` per line; blank lines and `#` comments ignored. Unknown keys and unparseable values
# are ignored (the default stands — a typo never disarms the fail-safe). No secrets here, only
# thresholds. Reloaded every tick (live tuning). All keys are shown with their DEFAULTS commented.
#
# The module only ever caps while a UPS is ON BATTERY; on AC it always restores the firmware default.
# Defaults are conservative: monitor + log while on battery, and cap only once the battery is
# genuinely draining (runtime at/below the floor) or the UPS raises its low-battery flag — so a brief
# outage on a healthy battery never throttles a running job.

# cap_pct=70            # cap target as a % of each GPU's firmware DEFAULT power limit (1..100).
                        # The device's accepted minimum is enforced automatically.

# cap_on_battery=false  # cap as soon as ANY UPS is on battery, regardless of runtime. Leave false
                        # to only cap when the battery is actually draining (see runtime_floor_s).

# runtime_floor_s=300   # cap when an on-battery UPS's estimated runtime (seconds) is at/below this.
                        # 0 disables the runtime trigger.
